# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "da-DK"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
  path_filters:
    # EF-genererede migrations er støj at reviewe
    - "!**/Migrations/**"
  path_instructions:
    - path: "**/*.cs"
      instructions: >-
        Dansk domæneprojekt: bevar danske identifikatorer (inkl. Å/ø/å) verbatim.
        Arkitekturen er bevidst simpel — foreslå IKKE MediatR, mediator/bus eller
        Clean Architecture-lag. Async arbejde kører via Hangfire-jobs (ingen
        in-process events). Forretningslogik hører til som metoder på
        domæne-entiteter (rich domain model). AI-kald går gennem
        Microsoft.Extensions.AI (IChatClient/IEmbeddingGenerator).
chat:
  auto_reply: true
